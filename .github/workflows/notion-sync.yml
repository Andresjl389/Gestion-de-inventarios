name: Sync Notion Tasks

on:
  push:
  pull_request:
    types: [opened, closed]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Extract TASK ID
        id: extract
        run: |
          TEXT="${{ github.event.head_commit.message }} ${{ github.event.pull_request.title }} ${{ github.head_ref }}"
          echo "Texto completo: $TEXT"

          if [[ $TEXT =~ (TASK-[0-9]+) ]]; then
            TASK_ID=${BASH_REMATCH[1]}
            echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT
            echo "TASK detectado: $TASK_ID"
          else
            echo "No se encontró TASK ID"
          fi

      - name: Set status based on event
        id: status
        run: |
          STATUS=""

          if [[ "${{ github.event_name }}" == "push" ]]; then
            STATUS="En progreso"
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ github.event.action }}" == "opened" ]]; then
              STATUS="En revision"
            fi

            if [[ "${{ github.event.action }}" == "closed" && "${{ github.event.pull_request.merged }}" == "true" ]]; then
              STATUS="Done"
            fi
          fi

          echo "Estado definido: $STATUS"
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Find page in Notion
        if: steps.extract.outputs.task_id != ''
        id: find
        run: |
          RESPONSE=$(curl -s -X POST "https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }}/query" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            --data '{
              "filter": {
                "property": "ID Texto",
                "rich_text": {
                  "equals": "'"${{ steps.extract.outputs.task_id }}"'"
                }
              }
            }')

          echo "Respuesta Notion:"
          echo "$RESPONSE"

          PAGE_ID=$(echo $RESPONSE | jq -r '.results[0].id')

          echo "page_id=$PAGE_ID" >> $GITHUB_OUTPUT
          echo "Page encontrada: $PAGE_ID"

      - name: Update status in Notion
        if: steps.find.outputs.page_id != '' && steps.status.outputs.status != ''
        run: |
          echo "Actualizando estado a: ${{ steps.status.outputs.status }}"

          curl -X PATCH "https://api.notion.com/v1/pages/${{ steps.find.outputs.page_id }}" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            --data '{
              "properties": {
                "Estado": {
                  "select": {
                    "name": "'"${{ steps.status.outputs.status }}"'"
                  }
                }
              }
            }'

          echo "Actualización enviada a Notion"